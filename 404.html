<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>404 — Soul Store</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👗</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root { --accent: #111; --accent-dark: #000; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; background: #f5f5f5; color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; }
    .container { max-width: 500px; }
    h1 { font-size: 100px; margin: 0; color: #000; font-weight: 900; }
    h2 { margin: 10px 0 16px; font-size: 22px; font-weight: 700; }
    p { color: #666; margin-bottom: 28px; font-size: 15px; line-height: 1.6; }
    a { display: inline-block; padding: 14px 32px; background: var(--accent); color: #fff; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 15px; transition: 0.25s; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
    a:hover { background: var(--accent-dark); transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Бет табылмады / Страница не найдена</h2>
    <p>Сіз іздеп отырған бет жоқ немесе жойылған.<br>Страница, которую вы ищете, не существует.</p>
    <a href="/">Басты бетке / На главную</a>
  </div>
</body>
</html>
