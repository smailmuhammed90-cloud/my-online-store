<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>Көйлектер — Soul Store</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👗</text></svg>" />
  <style>
    /* Premium Theme Definitions */
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --accent: #111;
      --accent-dark: #000;
      --bg: #f8f8f8;
      --card: #ffffff;
      --border: #e2e2e2;
      --text-main: #1a1a1a;
      --text-muted: #717171;
      --shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
      --radius: 16px;
      --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background-color: var(--bg);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* Navigation Bar */
    .nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-main);
      font-weight: 600;
      font-size: 14px;
      transition: var(--transition);
    }
    .back-link:hover { opacity: 0.7; transform: translateX(-3px); }

    .cart-trigger {
      position: relative;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
    }
    .cart-badge {
      position: absolute;
      top: -8px;
      right: -10px;
      background: #ff3b30;
      color: white;
      font-size: 10px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
    }

    /* Hero Section */
    .hero-banner {
      background: #000;
      color: #fff;
      padding: 80px 20px;
      text-align: center;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }
    .hero-banner h1 {
      font-size: clamp(32px, 5vw, 48px);
      margin: 0;
      font-weight: 800;
      letter-spacing: -1px;
      text-transform: uppercase;
    }
    .hero-banner p {
      margin: 10px 0 0;
      opacity: 0.6;
      font-size: 16px;
      letter-spacing: 2px;
    }

    /* Product Grid */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
    }

    /* Product Card with "Pop-up" Image effect */
    .product-item {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
    }

    .product-item:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow);
      border-color: #000;
    }

    .image-container {
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: #f0f0f0;
      position: relative;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
      opacity: 0; /* Starts hidden for fade-in */
    }

    .product-item:hover .product-img {
      transform: scale(1.08);
    }

    .product-info {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .product-info h3 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .product-info p {
      margin: 0 0 16px;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .price-tag {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
    }

    /* Loading and Empty States */
    #loader {
      display: flex;
      justify-content: center;
      padding: 100px 0;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg {
      text-align: center;
      padding: 100px 20px;
      grid-column: 1 / -1;
    }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
      .container { padding: 0 10px 40px; }
      .product-info { padding: 12px; }
      .product-info h3 { font-size: 15px; }
      .price-tag { font-size: 16px; }
    }
  </style>
</head>
<body>

  <nav class="nav-header">
    <a href="index.html" class="back-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Артқа
    </a>
    <div style="font-weight: 900; letter-spacing: 1px; font-size: 18px;">SOUL STORE</div>
    <div class="cart-trigger" onclick="location.href='cart.html'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
      <span class="cart-badge" id="cartBadge">0</span>
    </div>
  </nav>

  <header class="hero-banner">
    <h1>Көйлектер</h1>
    <p>DRESS COLLECTION</p>
  </header>

  <main class="container">
    <div id="loader"><div class="spinner"></div></div>
    <div id="productGrid" class="products-grid"></div>
  </main>

  <script>
    const CATEGORY_NAME = 'dresses';
    const EMOJI_FALLBACK = '👗';

    /**
     * Parse image URLs correctly. 
     * Handles both single strings and JSON arrays from the admin panel.
     */
    function parseImage(raw) {
      if (!raw) return '';
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed[0] : raw;
      } catch (e) {
        return raw;
      }
    }

    /**
     * Safely escape HTML to prevent XSS.
     */
    function escape(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    async function init() {
      const grid = document.getElementById('productGrid');
      const loader = document.getElementById('loader');
      const cartBadge = document.getElementById('cartBadge');

      // 1. Update Cart Badge
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      if (cart.length > 0) {
        cartBadge.innerText = cart.reduce((acc, item) => acc + (item.quantity || 1), 0);
        cartBadge.style.display = 'flex';
      }

      try {
        // 2. Fetch Data
        const response = await fetch(`/api/products?category=${CATEGORY_NAME}`);
        if (!response.ok) throw new Error('Network error');
        const products = await response.json();

        loader.style.display = 'none';

        if (!products || products.length === 0) {
          grid.innerHTML = `
            <div class="empty-msg">
              <div style="font-size: 40px; margin-bottom: 10px;">✨</div>
              <h3>Бұл бөлімде әзірге өнімдер жоқ</h3>
              <p>Жақында жаңа топтамалар қосылады.</p>
            </div>`;
          return;
        }

        // 3. Render Cards
        products.forEach(p => {
          const imgUrl = parseImage(p.image_url);
          const name = escape(p.name);
          const desc = escape(p.description_kk || p.description);
          const price = Number(p.price).toLocaleString('ru-RU');

          const card = document.createElement('div');
          card.className = 'product-item';
          card.onclick = () => location.href = `product.html?id=${p.id}`;

          card.innerHTML = `
            <div class="image-container">
              <img 
                src="${imgUrl}" 
                alt="${name}" 
                class="product-img" 
                onload="this.style.opacity='1'"
                onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%23eee%22/%3E%3Ctext x=%2250%25%22 y=%2255%25%22 font-size=%2250%22 text-anchor=%22middle%22%3E${EMOJI_FALLBACK}%3C/text%3E%3C/svg%3E'; this.style.opacity='1';"
              >
            </div>
            <div class="product-info">
              <h3>${name}</h3>
              <p>${desc}</p>
              <div class="product-footer">
                <span class="price-tag">${price} ₸</span>
                <div style="background: #f0f0f0; padding: 8px; border-radius: 50%;">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

      } catch (error) {
        console.error('Error loading products:', error);
        loader.innerHTML = '<p>Жүктеу кезінде қате орын алды. Бетті жаңартып көріңіз.</p>';
      }
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
