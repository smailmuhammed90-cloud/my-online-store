<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>Admin — Өнімдерді басқару</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:18px;background:#f7f7f7;color:#111}
    .wrap{max-width:1100px;margin:0 auto}
    h1{margin-bottom:8px}
    .card{background:#fff;padding:14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:12px}
    input,select,textarea{padding:8px;border-radius:6px;border:1px solid #ddd;width:100%}
    .small{font-size:13px;color:#666}
    .btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
    .btn-primary{background:#7b2cbf;color:#fff}
    .btn-danger{background:#e53935;color:#fff;}
    .grid{display:grid;grid-template-columns:1fr 360px;gap:18px}
    .product-list{max-height:60vh;overflow:auto}
    .product-item{display:flex;gap:12px;align-items:center;padding:12px;border-bottom:1px solid #eee}
    img.thumb{width:96px;height:96px;object-fit:cover;border-radius:6px}
    label.block{display:block;margin-bottom:6px;font-weight:600}
    .muted{color:#666;font-size:13px}
    .row{display:flex;gap:8px;align-items:center}
    pre.console{background:#0b1020;color:#d6f8ff;padding:10px;border-radius:6px;height:160px;overflow:auto}
    .actions { display:flex; flex-direction:column; gap:8px; }
    .note { background:#fff3e0; padding:8px; border-radius:6px; color:#8a6d00; }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="index.html" style="text-decoration:none"><button class="btn">⬅ Дүкенге қайту</button></a>
    <h1>Admin панелі — Өнімдерді басқару</h1>

    <div id="authStatus" class="card small muted">Тексеру — кіру күйі...</div>

    <div class="card grid">
      <!-- left: product form + list -->
      <div>
        <section style="margin-bottom:12px">
          <h3>Жаңа өнім қосу</h3>
          <div style="display:grid;gap:8px">
            <label class="block">Атауы<input id="p_name" placeholder="Атауы (бір тіл)"></label>
            <label class="block">Сипаттама (Қазақша)<textarea id="p_desc_kk" rows="3" placeholder="Сипаттама (kk)"></textarea></label>
            <label class="block">Описание (Русский)<textarea id="p_desc_ru" rows="3" placeholder="Описание (ru)"></textarea></label>
            <div style="display:flex;gap:8px">
              <input id="p_price" type="number" placeholder="Баға (теңге)"/>
              <input id="p_category" placeholder="Категория (dresses/hijabs)" list="category-options"/>
              <datalist id="category-options">
                <option value="dresses">
                <option value="hijabs">
              </datalist>
            </div>
            <label class="block">Өлшемдер (Размеры)<input id="p_sizes" placeholder="XS,S,M,L,XL" /></label>
            <label class="block">Сурет (файл) <input id="p_image" type="file" accept="image/*"></label>
            <label class="block">Қосымша сурет 2 <input id="p_image_2" type="file" accept="image/*"></label>
            <label class="block">Қосымша сурет 3 <input id="p_image_3" type="file" accept="image/*"></label>
            <label class="block">Қосымша сурет 4 <input id="p_image_4" type="file" accept="image/*"></label>
            <label class="block">Қосымша сурет 5 <input id="p_image_5" type="file" accept="image/*"></label>
            <div style="display:flex;gap:8px">
              <button id="addProductBtn" class="btn btn-primary">Қосу</button>
              <button id="clearFormBtn" class="btn">Тазалау</button>
            </div>
            <div id="addStatus" class="small muted"></div>
          </div>
        </section>

        <section>
          <h3>Бар өнімдер</h3>
          <div id="productsContainer" class="product-list"></div>
        </section>
      </div>

      <!-- right: preview / help -->
      <aside>
        <div class="card">
          <h4>Тез көрініс</h4>
          <div id="previewArea" style="text-align:center">
            <p class="muted">Таңдаған өніміңіз осы жерде көрсетіледі.</p>
            <img id="previewImg" src="" alt="" style="width:100%;height:auto;max-height:220px;object-fit:cover;border-radius:8px;display:none"/>
            <h4 id="previewName"></h4>
            <p id="previewPrice" class="muted"></p>
          </div>
        </div>

        <div class="card" style="margin-top:12px">
          <h4>Ескерту / Қателер</h4>
          <div id="note" class="note small">Мұнда Supabase немесе RLS қателері пайда болса, толық хабарлама көрсетіледі.</div>
        </div>
      </aside>
    </div>

    <div id="console" class="card"><pre id="log" class="console"></pre></div>
  </div>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>

  <script>
    // FIREBASE: use the same project you use to login
    const firebaseConfig = {
      apiKey: "AIzaSyBjIlddTv_tWkzDAKKlK_1TuK8TTYHbGJ0",
      authDomain: "soul-store-a1075.firebaseapp.com",
      projectId: "soul-store-a1075",
      storageBucket: "soul-store-a1075.appspot.com",
      messagingSenderId: "849267908668",
      appId: "1:849267908668:web:6c85f9fcfe7b8580e72339",
    };
    if (typeof firebase !== 'undefined') {
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      window.auth = window.auth || firebase.auth();
    } else {
      console.warn("Firebase SDK not loaded");
    }

    // Admin emails (exact emails that get admin access)
    window.ADMIN_EMAILS = ["ggbrochilguy@gmail.com","ggbrchilguy@gmail.com"];
  </script>

  <!-- Admin logic (Supabase) -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    // --- YOUR Supabase settings (from you)
    const SUPABASE_URL  = "https://mcqrqmhsosihxzpeppuu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcXJxbWhzb3NpaHh6cGVwcHV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY3MjEzNjQsImV4cCI6MjA3MjI5NzM2NH0.noFkES6WfwZKpJuPiwOaHA-qa-5ckgk2zDy3PGb9wwI";
    const BUCKET = "product-images";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.supabase = supabase;

    // DOM refs
    const statusEl = document.getElementById('authStatus');
    const addBtn = document.getElementById('addProductBtn');
    const clearBtn = document.getElementById('clearFormBtn');
    const productsContainer = document.getElementById('productsContainer');
    const addStatus = document.getElementById('addStatus');
    const logEl = document.getElementById('log');
    const previewImg = document.getElementById('previewImg');
    const previewName = document.getElementById('previewName');
    const previewPrice = document.getElementById('previewPrice');
    const noteEl = document.getElementById('note');

    function log(...args){ console.log(...args); logEl.textContent += args.map(a => (typeof a === 'object'? JSON.stringify(a,null,2): String(a))).join(' ') + '\n'; logEl.scrollTop = 99999; }

    // Detect product table columns (cache)
    let detectedColumns = null;
    async function detectProductColumns() {
      if (detectedColumns) return detectedColumns;
      try {
        // try to fetch one row and use its keys
        const { data, error } = await supabase.from('products').select('*').limit(1);
        if (!error && data && data.length > 0) {
          detectedColumns = Object.keys(data[0]);
          log('Detected columns from product row:', detectedColumns);
          return detectedColumns;
        }
        // fallback: try information_schema (may be blocked)
        try {
          const { data: cols, error: infoErr } = await supabase
            .from('information_schema.columns')
            .select('column_name')
            .eq('table_name','products')
            .order('ordinal_position',{ascending:true});
          if (!infoErr && cols && cols.length) {
            detectedColumns = cols.map(r=>r.column_name);
            log('Detected columns from information_schema:', detectedColumns);
            return detectedColumns;
          }
        } catch(e) { /* ignore */ }
        // last resort: common guess
        detectedColumns = ['id','name','description','price','category','image_url','created_at','description_kk','description_ru','sizes','extra_images'];
        log('Fallback guessed columns:', detectedColumns);
        return detectedColumns;
      } catch(e) {
        log('detectProductColumns failed', e);
        detectedColumns = ['id','name','description','price','category','image_url','created_at','description_kk','description_ru','sizes','extra_images'];
        return detectedColumns;
      }
    }

    // Check supabase connection quickly
    async function testSupabaseConnection(){
      try {
        const { data, error } = await supabase.from('products').select('id').limit(1);
        if (error) {
          log('Supabase test error:', error);
          if (/401|invalid|403/i.test(error.message||'')) {
            noteEl.textContent = "Supabase API key or URL error (401/403). Check the ANON KEY and URL in this file.";
          }
          if (/row-level|RLS/i.test(error.message||'')) {
            noteEl.textContent = "RLS blocked the query. Add the following policies in Supabase dashboard under 'products' table Policies:";
            noteEl.textContent += "\n- Update: 'auth.email() = ANY(ARRAY['ggbrochilguy@gmail.com','ggbrchilguy@gmail.com'])'";
            noteEl.textContent += "\n- Delete: 'auth.email() = ANY(ARRAY['ggbrochilguy@gmail.com','ggbrchilguy@gmail.com'])'";
          }
          return { ok:false, error };
        }
        log('Supabase test OK', data);
        noteEl.textContent = "Supabase connection ok (read test).";
        return { ok:true };
      } catch(e) {
        log('Connection exception', e);
        noteEl.textContent = "Network / DNS error connecting to Supabase. Check project URL.";
        return { ok:false, error:e };
      }
    }

    // upload file
    async function uploadFileAndGetPublicUrl(file){
      if(!file) return '';
      const filename = `${Date.now()}_${file.name.replace(/\s/g,'_')}`;
      const { data, error } = await supabase.storage.from(BUCKET).upload(filename, file, { upsert: false });
      if (error) {
        log('Storage upload error:', error);
        if (error.message && /row-level/i.test(error.message)) noteEl.textContent = "Storage upload blocked by RLS. Run storage policies in Supabase SQL editor (see snippet below).";
        throw error;
      }
      const { data: pub } = supabase.storage.from(BUCKET).getPublicUrl(filename);
      return pub.publicUrl;
    }

    function publicUrlToPath(url){
      if(!url) return null;
      try {
        const u = new URL(url);
        const prefix = `/storage/v1/object/public/${BUCKET}/`;
        if (u.pathname.startsWith(prefix)) return decodeURIComponent(u.pathname.slice(prefix.length));
        return decodeURIComponent(u.pathname.split('/').pop());
      } catch(e) { return null; }
    }

    // AUTH & startup
    (function attachAuth(){
      const allowed = (window.ADMIN_EMAILS || []).map(x => String(x||'').toLowerCase().trim()).filter(Boolean);
      log('Allowed admin emails:', allowed);

      if (!window.auth) {
        statusEl.textContent = 'Firebase auth not found on window — ensure Firebase script loaded above.';
        statusEl.style.color = 'crimson';
        // but continue to test supabase
        testSupabaseConnection();
        return;
      }

      auth.onAuthStateChanged(async (user) => {
        log('onAuthStateChanged ->', user && user.email);
        if (!user) {
          statusEl.textContent = 'Кіру қажет — Redirecting to login...';
          statusEl.style.color = 'crimson';
          setTimeout(() => location.href = 'login.html', 700);
          return;
        }
        const email = (user.email||'').toLowerCase().trim();
        if (!allowed.includes(email)) {
          statusEl.textContent = 'Сіз әкімші емессіз — қайта бағыттау...';
          statusEl.style.color = 'crimson';
          setTimeout(() => location.href = 'index.html', 900);
          return;
        }
        statusEl.textContent = 'Сәлем, әкімші — ' + user.email;
        statusEl.style.color = '';
        await testSupabaseConnection();
        await detectProductColumns();
        await refreshList();
      });
    })();

    // ADD product
    addBtn.addEventListener('click', async () => {
      addStatus.textContent = 'Жүктелуде...';
      try {
        const name = document.getElementById('p_name').value.trim();
        const desc_kk = document.getElementById('p_desc_kk').value.trim();
        const desc_ru = document.getElementById('p_desc_ru').value.trim();
        const price = Number(document.getElementById('p_price').value);
        const category = document.getElementById('p_category').value.trim().toLowerCase();
        const sizesStr = document.getElementById('p_sizes').value.trim();
        const sizes = sizesStr ? sizesStr.split(',').map(s => s.trim()) : [];
        const file = document.getElementById('p_image').files[0];

        if (!name || isNaN(price) || !category || sizes.length === 0) { 
          addStatus.textContent = 'Атауы, баға, категория және өлшемдер қажет'; 
          addStatus.style.color = 'crimson'; 
          return; 
        }

        let image_url = '';
        if (file) {
          image_url = await uploadFileAndGetPublicUrl(file);
          log('Public URL:', image_url);
        }

        // Upload extra images
        const extraImageUrls = [];
        const extraFileIds = ['p_image_2', 'p_image_3', 'p_image_4', 'p_image_5'];
        for (const fid of extraFileIds) {
          const extraFile = document.getElementById(fid).files[0];
          if (extraFile) {
            try {
              const extraUrl = await uploadFileAndGetPublicUrl(extraFile);
              extraImageUrls.push(extraUrl);
              log('Extra image URL:', extraUrl);
            } catch (e) {
              log('Extra image upload failed:', e);
            }
          }
        }

        const row = { name, description_kk: desc_kk, description_ru: desc_ru, price, category, image_url, sizes: JSON.stringify(sizes), extra_images: JSON.stringify(extraImageUrls) };
        const { data, error } = await supabase.from('products').insert([row]).select().single();

        if (error) {
          log('Insert product error', error);
          addStatus.textContent = 'Өнімді қосу қатесі: ' + (error.message || JSON.stringify(error));
          addStatus.style.color = 'crimson';
          return;
        }

        addStatus.textContent = 'Өнім қосылды';
        addStatus.style.color = '';
        ["p_name","p_desc_kk","p_desc_ru","p_price","p_category","p_sizes","p_image","p_image_2","p_image_3","p_image_4","p_image_5"].forEach(id=>document.getElementById(id).value='');
        previewImg.style.display = 'none';
        await refreshList();

        // Redirect based on category
        if (category === 'hijabs') {
          window.location.href = 'hijabs.html';
        } else if (category === 'dresses') {
          window.location.href = 'dresses.html';
        }
      } catch(err) {
        log('add product exception', err);
        addStatus.textContent = 'Сурет/Insert қатесі: ' + (err.message || err);
        addStatus.style.color = 'crimson';
      }
    });

    clearBtn.addEventListener('click', () => {
      ["p_name","p_desc_kk","p_desc_ru","p_price","p_category","p_sizes","p_image","p_image_2","p_image_3","p_image_4","p_image_5"].forEach(id=>document.getElementById(id).value='');
      previewImg.style.display = 'none';
      addStatus.textContent = '';
    });

    // refresh list
    async function refreshList(){
      productsContainer.innerHTML = '<div class="muted">Жүктелуде...</div>';
      try {
        const { data, error } = await supabase.from('products').select('*').order('created_at', {ascending:false}).limit(500);
        if (error) {
          log('Load products error', error);
          productsContainer.innerHTML = '<div class="small muted">Жүктеу қатесі: ' + (error.message || JSON.stringify(error)) + '</div>';
          return;
        }
        renderProducts(data || []);
      } catch(e) {
        log('refreshList exception', e);
        productsContainer.innerHTML = '<div class="small muted">Қате: ' + (e.message || e) + '</div>';
      }
    }

    // render products + attach save/delete
    function renderProducts(items){
      if (!items || items.length === 0) {
        productsContainer.innerHTML = '<div class="small muted">Өнімдер жоқ</div>';
        return;
      }
      productsContainer.innerHTML = '';
      items.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product-item card';
        const img = p.image_url || '';
        const sizes = JSON.parse(p.sizes || '[]').join(', ') || '';
        const extraImages = JSON.parse(p.extra_images || '[]');
        const extraImgThumbs = extraImages.map((u, i) => `<img src="${u}" style="width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid #ddd" onerror="this.style.display='none'" />`).join('');
        div.innerHTML = `
          <img class="thumb" src="${img}" onerror="this.src='https://via.placeholder.com/160x160.png?text=No+Image'"/>
          <div style="flex:1; margin-right:12px">
            <input data-id="${p.id}" data-field="name" value="${escapeHtml(p.name||'')}" style="width:100%;margin-bottom:6px"/>
            <textarea data-id="${p.id}" data-field="description_kk" rows="2" style="width:100%;margin-bottom:6px">${escapeHtml(p.description_kk||'')}</textarea>
            <textarea data-id="${p.id}" data-field="description_ru" rows="2" style="width:100%;margin-bottom:6px">${escapeHtml(p.description_ru||'')}</textarea>
            <div class="row" style="margin-top:6px">
              <input data-id="${p.id}" data-field="price" value="${p.price || ''}" style="width:120px;padding:6px;border-radius:6px;border:1px solid #ddd"/>
              <input data-id="${p.id}" data-field="category" value="${escapeHtml(p.category||'')}" style="padding:6px;border-radius:6px;border:1px solid #ddd;flex:1"/>
              <input data-id="${p.id}" data-field="sizes" value="${escapeHtml(sizes||'')}" style="padding:6px;border-radius:6px;border:1px solid #ddd;flex:1"/>
            </div>
            ${extraImages.length > 0 ? `<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">${extraImgThumbs}</div>` : ''}
            <div style="margin-top:8px">
              <label class="small">Қосымша суреттер (Extra images):</label>
              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
                <input data-id="${p.id}" data-field="extraFile1" type="file" accept="image/*" style="font-size:12px;max-width:180px"/>
                <input data-id="${p.id}" data-field="extraFile2" type="file" accept="image/*" style="font-size:12px;max-width:180px"/>
                <input data-id="${p.id}" data-field="extraFile3" type="file" accept="image/*" style="font-size:12px;max-width:180px"/>
                <input data-id="${p.id}" data-field="extraFile4" type="file" accept="image/*" style="font-size:12px;max-width:180px"/>
              </div>
            </div>
          </div>
          <div class="actions">
            <label class="small">ID: ${p.id}</label>
            <button class="btn saveBtn" data-id="${p.id}">Сақтау</button>
            <button class="btn btn-danger delBtn" data-id="${p.id}">Өшіру</button>
          </div>
        `;
        productsContainer.appendChild(div);
      });

      // save handlers
      productsContainer.querySelectorAll('.saveBtn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.id;
          const inputs = Array.from(productsContainer.querySelectorAll(`[data-id="${id}"]`));
          const updates = {};
          inputs.forEach(inp => {
            const f = inp.dataset.field;
            if (!f || f.startsWith('extraFile')) return;
            updates[f] = (f==='price') ? Number(inp.value) : (f==='sizes') ? JSON.stringify(inp.value.split(',').map(s => s.trim())) : inp.value;
          });

          // Upload extra images if any are selected
          const extraFileInputs = Array.from(productsContainer.querySelectorAll(`input[data-id="${id}"][data-field^="extraFile"]`));
          const newExtraUrls = [];
          for (const fi of extraFileInputs) {
            if (fi.files && fi.files[0]) {
              try {
                const url = await uploadFileAndGetPublicUrl(fi.files[0]);
                newExtraUrls.push(url);
              } catch(e) {
                log('Extra image upload failed during save:', e);
              }
            }
          }
          if (newExtraUrls.length > 0) {
            // Merge with existing extra_images
            try {
              const { data: existing } = await supabase.from('products').select('extra_images').eq('id', id).single();
              const existingUrls = JSON.parse((existing && existing.extra_images) || '[]');
              updates.extra_images = JSON.stringify([...existingUrls, ...newExtraUrls]);
            } catch(e) {
              updates.extra_images = JSON.stringify(newExtraUrls);
            }
          }

          try {
            addStatus.textContent = 'Сақталуда...';
            const cols = await detectProductColumns();
            // filter updates to only existing columns
            const safeUpdates = {};
            Object.keys(updates).forEach(k => { if (cols.includes(k)) safeUpdates[k] = updates[k]; });
            const { error } = await supabase.from('products').update(safeUpdates).eq('id', id);
            if (error) {
              log('update error', error);
              addStatus.textContent = 'Сақтау қатесі: ' + (error.message || error.code);
              addStatus.style.color = 'crimson';
              return;
            }
            addStatus.textContent = 'Сақталды';
            addStatus.style.color = '';
            setTimeout(() => addStatus.textContent = '', 1200);
            await refreshList();
          } catch(e) {
            log('save exception', e);
            addStatus.textContent = 'Сақтау қатесі: ' + (e.message || e);
            addStatus.style.color = 'crimson';
          }
        };
      });

      // delete handlers
      productsContainer.querySelectorAll('.delBtn').forEach(btn => {
        btn.onclick = async () => {
          if (!confirm('Өнімді жою ғой?')) return;
          const id = btn.dataset.id;
          try {
            // fetch product to get image_url
            const { data: row, error: fetchErr } = await supabase.from('products').select('id,image_url').eq('id', id).limit(1).single();
            if (fetchErr) { log('fetch before delete error', fetchErr); alert('Fetch error: ' + (fetchErr.message||fetchErr.code)); return; }
            // delete row
            const { error } = await supabase.from('products').delete().eq('id', id);
            if (error) { log('delete row error', error); alert('Delete error: ' + (error.message||error.code)); return; }
            // remove image if exists
            if (row && row.image_url) {
              const path = publicUrlToPath(row.image_url);
              if (path) {
                const { error: remErr } = await supabase.storage.from(BUCKET).remove([path]);
                if (remErr) log('remove image error', remErr); else log('image removed:', path);
              }
            }
            await refreshList();
          } catch(e) {
            log('delete exception', e); alert('Delete exception: ' + (e.message||e));
          }
        };
      });
    }

    // preview selected file
    document.getElementById('p_image').addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      previewImg.src = url;
      previewImg.style.display = 'block';
