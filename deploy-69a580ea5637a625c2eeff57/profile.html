<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>Менің профилім</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#fafafa;color:#111;margin:0;padding:0}
    .wrap{max-width:720px;margin:30px auto;padding:18px}
    .card{background:#fff;padding:18px;border-radius:10px;box-shadow:0 4px 18px rgba(0,0,0,0.06)}
    h1{margin:0 0 12px}
    .muted{color:#666;font-size:14px}
    .row{display:flex;align-items:center;gap:12px;margin-top:12px}
    .admin-badge{background:#111;color:#fff;padding:6px 10px;border-radius:999px;font-weight:700}
    .btn{padding:10px 14px;border-radius:8px;border:none;cursor:pointer}
    .btn-primary{background:#7b2cbf;color:white}
    .btn-outline{background:transparent;border:1px solid #ddd}
    .small{font-size:13px;color:#666;margin-top:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Менің профилім</h1>
      <div id="status" class="muted">Жүктелуде…</div>

      <div id="profileArea" style="display:none;">
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p id="extraInfo" class="small"></p>

        <div id="adminControls" style="display:none; margin-top:12px;">
          <span class="admin-badge">ADMIN</span>
          <div style="margin-top:10px;">
            <button id="goAdmin" class="btn btn-primary">Админ панеліне өту</button>
          </div>
        </div>

        <div class="row" style="margin-top:18px;">
          <button id="logoutBtn" class="btn btn-outline">Шығу</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>

  <!-- your firebase.js (must initialize firebase and set window.auth and window.ADMIN_EMAILS) -->
  <script src="firebase.js"></script>

  <script>
    (function(){
      // safety: ensure DOM ready
      document.addEventListener('DOMContentLoaded', () => {
        const statusEl = document.getElementById('status');
        const profileArea = document.getElementById('profileArea');
        const userEmailEl = document.getElementById('userEmail');
        const extraInfo = document.getElementById('extraInfo');
        const adminControls = document.getElementById('adminControls');
        const goAdmin = document.getElementById('goAdmin');
        const logoutBtn = document.getElementById('logoutBtn');

        // auth must be defined by firebase.js
        if (typeof auth === 'undefined') {
          statusEl.textContent = 'Firebase auth жоқ — firebase.js қосылғанын тексеріңіз.';
          statusEl.style.color = 'crimson';
          return;
        }

        // helper normalize
        const normalize = s => (s || '').toString().toLowerCase().trim();

        auth.onAuthStateChanged(user => {
          if (!user) {
            // not logged in -> send to login (or show message)
            statusEl.textContent = 'Кіру қажет. Сізді кіру бетінен бағыттаймыз...';
            setTimeout(()=> location.href = 'login.html', 900);
            return;
          }

          // user is logged in -> show profile
          profileArea.style.display = '';
          statusEl.style.display = 'none';

          const email = user.email || '';
          userEmailEl.textContent = email;

          // optionally show displayName / phoneNumber
          let extras = [];
          if (user.displayName) extras.push('Аты: ' + user.displayName);
          if (user.phoneNumber) extras.push('Телефон: ' + user.phoneNumber);
          extraInfo.textContent = extras.join(' • ');

          // admin check using window.ADMIN_EMAILS (defined in firebase.js)
          const adminEmails = Array.isArray(window.ADMIN_EMAILS) ? window.ADMIN_EMAILS.map(normalize) : [];
          const isAdmin = adminEmails.includes(normalize(email));

          if (isAdmin) {
            adminControls.style.display = 'block';
          } else {
            adminControls.style.display = 'none';
          }
        });

        // logout
        logoutBtn.addEventListener('click', () => {
          auth.signOut().then(()=> {
            location.href = 'index.html';
          });
        });

        // go to admin panel only when clicked (admin.html should re-verify on load)
        goAdmin.addEventListener('click', () => {
          // extra safety: check current user and admin flag before redirect
          const user = auth.currentUser;
          const adminEmails = Array.isArray(window.ADMIN_EMAILS) ? window.ADMIN_EMAILS.map(s => s.toLowerCase().trim()) : [];
          const isAdmin = user && adminEmails.includes((user.email || '').toLowerCase().trim());
          if (!isAdmin) {
            alert('Сіз әкімші емессіз.');
            return;
          }
          location.href = 'admin.html';
        });
      });
    })();
  </script>
</body>
</html>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
