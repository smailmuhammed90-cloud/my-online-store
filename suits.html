<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>Костюмдер — Soul Store</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧥</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --accent: #111; --accent-dark: #000; --accent-light: #e8e8e8;
      --text: #111; --text-muted: #666; --bg: #f5f5f5; --card: #fff;
      --border: #ddd; --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 12px; --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
    .topbar { display: flex; align-items: center; gap: 14px; padding: 14px 24px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .back-btn { background: var(--accent); color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: var(--transition); text-decoration: none; display: inline-block; }
    .back-btn:hover { background: var(--accent-dark); transform: translateX(-2px); }
    .topbar-title { font-weight: 700; font-size: 16px; flex: 1; }
    .page-header { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, #222 0%, #111 50%, #000 100%); position: relative; color: white; }
    .page-header::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: linear-gradient(to top, var(--bg), transparent); }
    .page-header h1 { font-size: 36px; margin: 0 0 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    .page-header p { font-size: 16px; opacity: 0.8; margin: 0; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; padding: 30px; max-width: 1200px; margin: 0 auto; }
    .product-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: var(--transition); cursor: pointer; border: 1px solid var(--border); display: flex; flex-direction: column; }
    .product-card:hover { transform: translateY(-6px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    .product-card img { width: 100%; height: 320px; object-fit: cover; display: block; background: #eee; }
    .product-card .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .product-card h3 { font-size: 16px; margin: 0 0 6px; font-weight: 600; }
    .product-card p { color: var(--text-muted); margin: 0 0 12px; font-size: 13px; line-height: 1.4; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .price { font-weight: 700; color: var(--accent); font-size: 18px; }
    #cart-icon { cursor: pointer; position: relative; font-size: 22px; padding: 4px 8px; }
    #cart-count { background: #ff3b30; color: white; font-size: 10px; font-weight: 800; border-radius: 50%; width: 18px; height: 18px; display: none; align-items: center; justify-content: center; position: absolute; top: -2px; right: -2px; border: 2px solid white; }
    #loading { text-align: center; padding: 60px; font-weight: 500; color: var(--text-muted); }
    .empty { text-align: center; color: var(--text-muted); padding: 80px 20px; font-size: 16px; grid-column: 1 / -1; }
    footer { padding: 40px 20px; text-align: center; color: var(--text-muted); border-top: 1px solid var(--border); background: var(--card); font-size: 14px; margin-top: 40px; }
    @media (max-width: 700px) { .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; } .product-card img { height: 240px; } .page-header h1 { font-size: 26px; } }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back-btn" href="index.html">← Артқа</a>
    <div class="topbar-title">Soul Store — Костюмдер</div>
    <div id="cart-icon" onclick="location.href='cart.html'">🛒 <span id="cart-count">0</span></div>
  </div>
  <header class="page-header">
    <h1>Костюмдер</h1>
    <p>Catalog — Suits</p>
  </header>
  <main>
    <div id="loading">Жүктелуде...</div>
    <div id="products" class="products-grid"></div>
    <div id="emptyHint" class="empty" style="display:none">Өнімдер табылмады</div>
  </main>
  <footer>&copy; 2026 Soul Store</footer>
  <script>
    (function() {
      const category = 'suits';
      const grid = document.getElementById('products');
      const emptyHint = document.getElementById('emptyHint');
      const loading = document.getElementById('loading');

      function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
      function getFirstImage(raw) { try { const p = JSON.parse(raw); return Array.isArray(p)?p[0]:raw; } catch(e) { return raw; } }

      async function loadProducts() {
        try {
          const res = await fetch(`/api/products?category=${category}`);
          const products = await res.json();
          if (!products || products.length === 0) { emptyHint.style.display = 'block'; }
          else {
            products.forEach(p => {
              const card = document.createElement('div');
              card.className = 'product-card';
              card.onclick = () => location.href = `product.html?id=${p.id}`;
              card.innerHTML = `
                <img src="${escapeHtml(getFirstImage(p.image_url))}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23eee%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2240%22%3E🧥%3C/text%3E%3C/svg%3E'">
                <div class="card-body">
                  <h3>${escapeHtml(p.name)}</h3>
                  <p>${escapeHtml(p.description_kk || p.description || '')}</p>
                  <div class="price">${Number(p.price).toLocaleString()} ₸</div>
                </div>`;
              grid.appendChild(card);
            });
          }
        } catch (err) { grid.innerHTML = '<div class="empty">Қате орын алды</div>'; }
        finally { loading.style.display = 'none'; }
      }
      function updateCart() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const count = cart.reduce((s, i) => s + (i.quantity || 1), 0);
        const el = document.getElementById('cart-count');
        if (el) { el.textContent = count; el.style.display = count > 0 ? 'flex' : 'none'; }
      }
      loadProducts(); updateCart();
    })();
  </script>
</body>
</html>
