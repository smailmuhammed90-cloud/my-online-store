<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>Admin — Soul Store</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --accent: #111; --accent-dark: #000; --accent-light: #e8e8e8;
      --text: #111; --text-muted: #666; --bg: #f5f5f5; --card: #fff;
      --border: #ddd; --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 12px; --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding: 20px; }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .back-btn { background: var(--accent); color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: var(--transition); text-decoration: none; display: inline-block; }
    .back-btn:hover { background: var(--accent-dark); }
    h1 { margin: 0; font-size: 24px; font-weight: 800; }
    #authStatus { padding: 12px 18px; border-radius: var(--radius); background: var(--card); border: 1px solid var(--border); margin-bottom: 20px; font-size: 14px; color: var(--text-muted); }
    .admin-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
    .card { background: var(--card); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-muted); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; transition: var(--transition); font-family: inherit; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; transition: var(--transition); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-danger { background: #e53935; color: #fff; }
    .btn-danger:hover { background: #c62828; }
    .btn-outline { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-group { display: flex; gap: 10px; margin-top: 8px; }
    #addStatus { font-size: 13px; margin-top: 8px; min-height: 20px; }
    .product-list { max-height: 65vh; overflow-y: auto; }
    .product-item { display: flex; gap: 14px; align-items: center; padding: 14px; border-bottom: 1px solid var(--border); transition: var(--transition); }
    .product-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; background: var(--bg); }
    .product-item .info { flex: 1; }
    .upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; transition: var(--transition); margin-bottom: 14px; }
    .upload-area:hover { border-color: var(--accent); background: var(--accent-light); }
    
    /* Gallery Styles */
    .img-gallery { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; justify-content: center; }
    .img-gallery img { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
    .preview-panel .main-preview { width: 100%; max-height: 300px; object-fit: cover; border-radius: var(--radius); margin-bottom: 10px; }
    
    @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back-btn" href="/">&larr; Дүкенге қайту</a>
      <h1>Admin панелі</h1>
    </div>

    <div id="authStatus">Тексеру...</div>

    <div class="admin-grid">
      <div>
        <div class="card" style="margin-bottom:20px">
          <h3 style="margin:0 0 18px;font-size:18px;font-weight:700">Өнімді басқару</h3>
          
          <div class="form-group">
            <label>Атауы / Название</label>
            <input id="p_name" placeholder="Өнім атауы" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Баға / Цена (₸)</label>
              <input id="p_price" type="number" placeholder="15000" />
            </div>
            <div class="form-group">
              <label>Категория</label>
              <select id="p_category">
                <option value="dresses">Көйлектер</option>
                <option value="hijabs">Орамалдар</option>
                <option value="underwear">Іш киім</option>
                <option value="suits">Костюмдер</option>
                <option value="sweaters">Кофталар</option>
                <option value="pants">Штандар</option>
                <option value="jeans">Джинсылар</option>
                <option value="jackets">Пиджактар</option>
                <option value="sundresses">Сарафандар</option>
                <option value="skirts">Юбкалар</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Өлшемдер / Размеры</label>
            <input id="p_sizes" placeholder="S,M,L,XL" />
          </div>

          <div class="form-group">
            <label>Сипаттама (KK/RU)</label>
            <textarea id="p_desc_kk" rows="2" placeholder="Қазақша сипаттама"></textarea>
            <textarea id="p_desc_ru" rows="2" placeholder="Описание на русском" style="margin-top:8px"></textarea>
          </div>

          <div class="form-group">
            <label>Суреттер / Изображения (Бірнешеуін таңдауға болады)</label>
            <div class="upload-area" id="uploadArea">
              <div id="uploadPlaceholder">Суреттерді таңдау (Multiple)</div>
              <div id="galleryPreview" class="img-gallery"></div>
            </div>
            <input type="hidden" id="p_image_urls" />
          </div>

          <div class="btn-group">
            <button id="addProductBtn" class="btn btn-primary">Қосу / Добавить</button>
            <button id="clearFormBtn" class="btn btn-outline">Тазалау</button>
          </div>
          <div id="addStatus"></div>
        </div>

        <div class="card">
          <h3 style="margin:0 0 14px;font-size:18px;font-weight:700">Бар өнімдер</h3>
          <div id="productsContainer" class="product-list"></div>
        </div>
      </div>

      <aside>
        <div class="card preview-panel">
          <h4>Предпросмотр</h4>
          <img id="previewImg" class="main-preview" src="" style="display:none" />
          <div id="previewGallery" class="img-gallery"></div>
          <h4 id="previewName" style="margin-top:15px"></h4>
          <p id="previewPrice" style="font-weight:bold; color:var(--accent)"></p>
        </div>
      </aside>
    </div>
  </div>

  <script>
    UPLOADCARE_PUBLIC_KEY = '3d4dc407820559de1c77';
  </script>
  <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>

  <script>
    (function(){
      const $ = (id) => document.getElementById(id);
      let editingId = null;
      let currentImages = [];

      // MULTI-UPLOAD LOGIC
      $('uploadArea').onclick = function() {
        uploadcare.openDialog(null, {
          multiple: true,
          imagesOnly: true
        }).done(function(group) {
          group.promise().done(function(groupInfo) {
            // Wait for all files to be ready and get their URLs
            Promise.all(groupInfo.files().map(f => f.promise())).then(files => {
              currentImages = files.map(f => f.cdnUrl);
              updateImageUI();
            });
          });
        });
      };

      function updateImageUI() {
        $('p_image_urls').value = JSON.stringify(currentImages);
        
        // Update Form Gallery
        $('galleryPreview').innerHTML = currentImages.map(url => `<img src="${url}">`).join('');
        $('uploadPlaceholder').style.display = currentImages.length ? 'none' : 'block';

        // Update Sidebar Preview
        if(currentImages.length) {
          $('previewImg').src = currentImages[0];
          $('previewImg').style.display = 'block';
          $('previewGallery').innerHTML = currentImages.map(url => `<img src="${url}">`).join('');
        }
      }

      function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

      // AUTH & LOAD
      auth.onAuthStateChanged(async user => {
        if (!user || !(window.ADMIN_EMAILS || []).includes(user.email)) {
          location.href = 'login.html';
          return;
        }
        $('authStatus').textContent = 'Админ: ' + user.email;
        refreshList();
      });

      async function refreshList() {
        const res = await fetch('/api/products');
        const data = await res.json();
        renderProducts(data);
      }

      function renderProducts(items) {
        const container = $('productsContainer');
        container.innerHTML = '';
        items.forEach(p => {
          let imgs = [];
          try { imgs = JSON.parse(p.image_url || '[]'); } catch(e) { imgs = [p.image_url]; }
          
          const div = document.createElement('div');
          div.className = 'product-item';
          div.innerHTML = `
            <img src="${imgs[0] || ''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><rect fill=%22%23eee%22 width=%2280%22 height=%2280%22/></svg>'">
            <div class="info">
              <div class="name">${escapeHtml(p.name)}</div>
              <div class="meta">${escapeHtml(p.category)} | ${imgs.length} сурет</div>
              <div style="font-weight:bold">${Number(p.price).toLocaleString()} ₸</div>
            </div>
            <div class="actions">
              <button class="btn btn-outline" onclick='editProduct(${JSON.stringify(p)})'>Өзгерту</button>
              <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">Өшіру</button>
            </div>
          `;
          container.appendChild(div);
        });
      }

      // SAVE / UPDATE
      $('addProductBtn').onclick = async function() {
        const payload = {
          name: $('p_name').value,
          description_kk: $('p_desc_kk').value,
          description_ru: $('p_desc_ru').value,
          price: Number($('p_price').value),
          category: $('p_category').value,
          image_url: JSON.stringify(currentImages), // Store as array
          sizes: JSON.stringify($('p_sizes').value.split(',').map(s => s.trim()))
        };

        const method = editingId ? 'PUT' : 'POST';
        if(editingId) payload.id = editingId;

        const res = await fetch('/api/products', {
          method: method,
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });

        if(res.ok) {
          alert('Сәтті!');
          location.reload();
        }
      };

      window.editProduct = (p) => {
        editingId = p.id;
        $('p_name').value = p.name;
        $('p_price').value = p.price;
        $('p_category').value = p.category;
        $('p_desc_kk').value = p.description_kk || '';
        $('p_desc_ru').value = p.description_ru || '';
        
        try { 
          currentImages = JSON.parse(p.image_url || '[]'); 
        } catch(e) { 
          currentImages = p.image_url ? [p.image_url] : []; 
        }
        
        try {
          const sz = JSON.parse(p.sizes || '[]');
          $('p_sizes').value = Array.isArray(sz) ? sz.join(',') : sz;
        } catch(e) {}

        updateImageUI();
        $('addProductBtn').textContent = 'Сақтау / Сохранить';
        window.scrollTo(0,0);
      };

      window.deleteProduct = async (id) => {
        if(!confirm('Жоюды растайсыз ба?')) return;
        await fetch('/api/products?id=' + id, { method: 'DELETE' });
        refreshList();
      };

      $('clearFormBtn').onclick = () => location.reload();
      
      // Live Preview for Text
      $('p_name').oninput = (e) => $('previewName').textContent = e.target.value;
      $('p_price').oninput = (e) => $('previewPrice').textContent = e.target.value + ' ₸';

    })();
  </script>
</body>
</html>
