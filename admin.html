<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>Admin — Soul Store</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --accent: #111; --accent-dark: #000; --accent-light: #e8e8e8;
      --text: #111; --text-muted: #666; --bg: #f5f5f5; --card: #fff;
      --border: #ddd; --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 12px; --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding: 20px; }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .back-btn { background: var(--accent); color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: var(--transition); text-decoration: none; display: inline-block; }
    .back-btn:hover { background: var(--accent-dark); }
    h1 { margin: 0; font-size: 24px; font-weight: 800; }

    #authStatus { padding: 12px 18px; border-radius: var(--radius); background: var(--card); border: 1px solid var(--border); margin-bottom: 20px; font-size: 14px; color: var(--text-muted); }

    .admin-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
    .card { background: var(--card); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); }

    /* Form */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-muted); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; transition: var(--transition); font-family: inherit; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; transition: var(--transition); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-danger { background: #e53935; color: #fff; }
    .btn-danger:hover { background: #c62828; }
    .btn-outline { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-group { display: flex; gap: 10px; margin-top: 8px; }

    #addStatus { font-size: 13px; margin-top: 8px; min-height: 20px; }

    /* Product list */
    .product-list { max-height: 65vh; overflow-y: auto; }
    .product-item { display: flex; gap: 14px; align-items: center; padding: 14px; border-bottom: 1px solid var(--border); transition: var(--transition); }
    .product-item:hover { background: var(--bg); }
    .product-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; background: var(--bg); }
    .product-item .info { flex: 1; }
    .product-item .info .name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .product-item .info .meta { font-size: 12px; color: var(--text-muted); }
    .product-item .info .price-tag { color: var(--accent); font-weight: 700; font-size: 15px; }
    .product-item .actions { display: flex; flex-direction: column; gap: 6px; }
    .product-item .actions .btn { font-size: 12px; padding: 6px 12px; }

    /* Uploadcare preview */
    .upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; transition: var(--transition); margin-bottom: 14px; }
    .upload-area:hover { border-color: var(--accent); background: var(--accent-light); }
    .upload-area img { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px; }
    .upload-area .placeholder { color: var(--text-muted); font-size: 14px; }

    /* Preview panel */
    .preview-panel { text-align: center; }
    .preview-panel img { max-width: 100%; max-height: 250px; border-radius: var(--radius); object-fit: cover; }
    .preview-panel h4 { margin: 12px 0 4px; }
    .preview-panel .price { color: var(--accent); }

    .note { background: #fff8e1; padding: 12px; border-radius: 8px; color: #795548; font-size: 13px; margin-top: 12px; border: 1px solid #ffe0b2; }

    @media (max-width: 900px) {
      .admin-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class='back-btn' href='/'>&larr; Дүкенге қайту</a>
      <h1>Admin панелі</h1>
    </div>

    <div id="authStatus">Тексеру — кіру күйі...</div>

    <div class="admin-grid">
      <div>
        <!-- Add product form -->
        <div class="card" style="margin-bottom:20px">
          <h3 style="margin:0 0 18px;font-size:18px;font-weight:700">Жаңа өнім қосу</h3>
          <div class="form-group">
            <label>Атауы / Название</label>
            <input id="p_name" placeholder="Өнім атауы" />
          </div>
          <div class="form-group">
            <label>Сипаттама (Қазақша)</label>
            <textarea id="p_desc_kk" rows="2" placeholder="Сипаттама"></textarea>
          </div>
          <div class="form-group">
            <label>Описание (Русский)</label>
            <textarea id="p_desc_ru" rows="2" placeholder="Описание"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Баға / Цена (&#8376;)</label>
              <input id="p_price" type="number" placeholder="15000" />
            </div>
            <div class="form-group">
              <label>Категория</label>
              <select id="p_category">
                <option value="dresses">Көйлектер / Dresses</option>
                <option value="hijabs">Орамалдар / Hijabs</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Өлшемдер / Размеры</label>
            <input id="p_sizes" placeholder="40,42,44,46 немесе XS,S,M,L,XL" />
          </div>
          <div class="form-group">
            <label>Сурет / Изображение</label>
            <div class="upload-area" id="uploadArea">
              <div class="placeholder" id="uploadPlaceholder">Суретті жүктеу үшін басыңыз / Нажмите для загрузки</div>
              <img id="uploadPreview" style="display:none" />
            </div>
            <input type="hidden" id="p_image_url" />
          </div>
          <div class="btn-group">
            <button id="addProductBtn" class="btn btn-primary">Қосу / Добавить</button>
            <button id="clearFormBtn" class="btn btn-outline">Тазалау</button>
          </div>
          <div id="addStatus"></div>
        </div>

        <!-- Product list -->
        <div class="card">
          <h3 style="margin:0 0 14px;font-size:18px;font-weight:700">Бар өнімдер</h3>
          <div id="productsContainer" class="product-list"></div>
        </div>
      </div>

      <!-- Right sidebar -->
      <aside>
        <div class="card preview-panel">
          <h4>Тез көрініс / Предпросмотр</h4>
          <img id="previewImg" src="" alt="" style="display:none" />
          <h4 id="previewName" style="color:var(--text)"></h4>
          <p id="previewPrice" class="price"></p>
        </div>
        <div class="note" id="noteArea">
          Мұнда қателер пайда болса, толық хабарлама көрсетіледі.
        </div>
      </aside>
    </div>
  </div>

  <!-- Uploadcare widget -->
  <script>
    UPLOADCARE_LOCALE = 'en';
    UPLOADCARE_PUBLIC_KEY = '3d4dc407820559de1c77';
  </script>
  <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>

  <script>
    (function(){
      var statusEl = document.getElementById('authStatus');
      var addBtn = document.getElementById('addProductBtn');
      var clearBtn = document.getElementById('clearFormBtn');
      var productsContainer = document.getElementById('productsContainer');
      var addStatus = document.getElementById('addStatus');
      var noteEl = document.getElementById('noteArea');
      var previewImg = document.getElementById('previewImg');
      var previewName = document.getElementById('previewName');
      var previewPrice = document.getElementById('previewPrice');
      var uploadPreview = document.getElementById('uploadPreview');
      var uploadPlaceholder = document.getElementById('uploadPlaceholder');
      var imageUrlInput = document.getElementById('p_image_url');

      function escapeHtml(s){ if(s === null || s === undefined) return ''; return String(s).replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }); }

      // Uploadcare integration
      var uploadArea = document.getElementById('uploadArea');
      uploadArea.addEventListener('click', function() {
        var dialog = uploadcare.openDialog(null, {
          publicKey: '3d4dc407820559de1c77',
          imagesOnly: true,
          crop: 'free'
        });
        dialog.done(function(file) {
          file.done(function(info) {
            var url = info.cdnUrl;
            imageUrlInput.value = url;
            uploadPreview.src = url;
            uploadPreview.style.display = 'block';
            uploadPlaceholder.style.display = 'none';
            // Also update preview panel
            previewImg.src = url;
            previewImg.style.display = 'block';
          });
        });
      });

      // AUTH check
      var allowed = (window.ADMIN_EMAILS || []).map(function(x){ return String(x||'').toLowerCase().trim(); }).filter(Boolean);

      if (!window.auth) {
        statusEl.textContent = 'Firebase auth жоқ';
        statusEl.style.color = '#c62828';
        return;
      }

      auth.onAuthStateChanged(async function(user) {
        if (!user) {
          statusEl.textContent = 'Кіру қажет — Redirecting...';
          statusEl.style.color = '#c62828';
          setTimeout(function(){ location.href = 'login.html'; }, 700);
          return;
        }
        var email = (user.email||'').toLowerCase().trim();
        if (!allowed.includes(email)) {
          statusEl.textContent = 'Сіз әкімші емессіз — қайта бағыттау...';
          statusEl.style.color = '#c62828';
          setTimeout(function(){ location.href = 'index.html'; }, 900);
          return;
        }
        statusEl.textContent = 'Сәлем, ' + user.email;
        statusEl.style.color = '#2e7d32';
        statusEl.style.background = '#e8f5e9';
        statusEl.style.borderColor = '#c8e6c9';
        await refreshList();
      });

      // ADD product
      addBtn.addEventListener('click', async function() {
        if (editingId) return; // skip — edit handler below will handle this
        addStatus.textContent = 'Жүктелуде...';
        addStatus.style.color = 'var(--text-muted)';
        try {
          var name = document.getElementById('p_name').value.trim();
          var desc_kk = document.getElementById('p_desc_kk').value.trim();
          var desc_ru = document.getElementById('p_desc_ru').value.trim();
          var price = Number(document.getElementById('p_price').value);
          var category = document.getElementById('p_category').value;
          var sizesStr = document.getElementById('p_sizes').value.trim();
          var sizes = sizesStr ? sizesStr.split(',').map(function(s){ return s.trim(); }) : [];
          var image_url = imageUrlInput.value;

          if (!name || isNaN(price) || !category || sizes.length === 0) {
            addStatus.textContent = 'Атауы, баға, категория және өлшемдер қажет';
            addStatus.style.color = '#c62828';
            return;
          }

          var res = await fetch('/api/products', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: name,
              description_kk: desc_kk,
              description_ru: desc_ru,
              price: price,
              category: category,
              image_url: image_url,
              sizes: JSON.stringify(sizes)
            })
          });
          var data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed');

          addStatus.textContent = 'Өнім қосылды!';
          addStatus.style.color = '#2e7d32';
          clearForm();
          await refreshList();
        } catch(err) {
          addStatus.textContent = 'Қате: ' + (err.message || err);
          addStatus.style.color = '#c62828';
        }
      });

      function clearForm() {
        ['p_name','p_desc_kk','p_desc_ru','p_price','p_sizes'].forEach(function(id){ document.getElementById(id).value = ''; });
        document.getElementById('p_category').selectedIndex = 0;
        imageUrlInput.value = '';
        uploadPreview.style.display = 'none';
        uploadPlaceholder.style.display = 'block';
        previewImg.style.display = 'none';
        previewName.textContent = '';
        previewPrice.textContent = '';
      }

      clearBtn.addEventListener('click', function() {
        clearForm();
        editingId = null;
        addBtn.textContent = 'Қосу / Добавить';
        addStatus.textContent = '';
      });

      // Preview on input
      document.getElementById('p_name').addEventListener('input', function() {
        previewName.textContent = this.value;
      });
      document.getElementById('p_price').addEventListener('input', function() {
        previewPrice.textContent = this.value ? this.value + ' \u20B8' : '';
      });

      // Refresh product list
      async function refreshList() {
        productsContainer.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center">Жүктелуде...</div>';
        try {
          var res = await fetch('/api/products');
          var data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to load');
          renderProducts(Array.isArray(data) ? data : []);
        } catch(e) {
          productsContainer.innerHTML = '<div style="color:#c62828;padding:20px">' + escapeHtml(e.message) + '</div>';
          noteEl.textContent = 'API қатесі: ' + (e.message || 'Unknown error');
          noteEl.style.color = '#c62828';
        }
      }

      function renderProducts(items) {
        if (!items || items.length === 0) {
          productsContainer.innerHTML = '<div style="color:var(--text-muted);padding:30px;text-align:center">Өнімдер жоқ / Нет товаров</div>';
          return;
        }
        productsContainer.innerHTML = '';
        items.forEach(function(p) {
          var div = document.createElement('div');
          div.className = 'product-item';
          var sizes = [];
          try {
            if (Array.isArray(p.sizes)) { sizes = p.sizes; }
            else { sizes = JSON.parse(p.sizes || '[]'); }
          } catch(e) {}

          var img = document.createElement('img');
          img.src = p.image_url || '';
          img.alt = escapeHtml(p.name);
          img.onerror = function(){ this.src = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><rect fill=%22%23f0f0f0%22 width=%2280%22 height=%2280%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23111%22 font-size=%2224%22>\uD83D\uDC57</text></svg>'; };
          div.appendChild(img);

          var info = document.createElement('div');
          info.className = 'info';
          info.innerHTML =
            '<div class="name">' + escapeHtml(p.name) + '</div>' +
            '<div class="meta">' + escapeHtml(p.category) + ' | ' + (Array.isArray(sizes) ? sizes.join(', ') : sizes) + '</div>' +
            '<div class="price-tag">' + Number(p.price || 0).toLocaleString() + ' \u20B8</div>';
          div.appendChild(info);

          var actions = document.createElement('div');
          actions.className = 'actions';

          var editBtn = document.createElement('button');
          editBtn.className = 'btn btn-outline';
          editBtn.textContent = 'Өзгерту';
          editBtn.addEventListener('click', function() { startEdit(p); });
          actions.appendChild(editBtn);

          var delBtn = document.createElement('button');
          delBtn.className = 'btn btn-danger';
          delBtn.textContent = 'Өшіру';
          delBtn.addEventListener('click', async function() {
            if (!confirm('Өнімді жою ғой?')) return;
            try {
              var res = await fetch('/api/products?id=' + p.id, { method: 'DELETE' });
              if (!res.ok) throw new Error('Failed');
              await refreshList();
            } catch(e) {
              alert('Қате: ' + (e.message || e));
            }
          });
          actions.appendChild(delBtn);

          div.appendChild(actions);
          productsContainer.appendChild(div);
        });
      }

      // Edit mode: populate form for editing
      var editingId = null;

      function startEdit(p) {
        editingId = p.id;
        document.getElementById('p_name').value = p.name || '';
        document.getElementById('p_desc_kk').value = p.description_kk || '';
        document.getElementById('p_desc_ru').value = p.description_ru || '';
        document.getElementById('p_price').value = p.price || '';
        document.getElementById('p_category').value = p.category || 'dresses';
        var sizes = [];
        try { sizes = JSON.parse(p.sizes || '[]'); } catch(e) {}
        document.getElementById('p_sizes').value = Array.isArray(sizes) ? sizes.join(',') : '';
        imageUrlInput.value = p.image_url || '';
        if (p.image_url) {
          uploadPreview.src = p.image_url;
          uploadPreview.style.display = 'block';
          uploadPlaceholder.style.display = 'none';
          previewImg.src = p.image_url;
          previewImg.style.display = 'block';
        }
        previewName.textContent = p.name || '';
        previewPrice.textContent = (p.price || '') + ' \u20B8';
        addBtn.textContent = 'Сақтау / Сохранить';
        addStatus.textContent = 'Өзгерту режимі — ID: ' + p.id;
        addStatus.style.color = 'var(--accent)';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // Edit handler (runs when editingId is set)
      addBtn.addEventListener('click', async function(e) {
        if (!editingId) return; // handled by first listener for new products

        addStatus.textContent = 'Сақталуда...';
        addStatus.style.color = 'var(--text-muted)';
        try {
          var name = document.getElementById('p_name').value.trim();
          var desc_kk = document.getElementById('p_desc_kk').value.trim();
          var desc_ru = document.getElementById('p_desc_ru').value.trim();
          var price = Number(document.getElementById('p_price').value);
          var category = document.getElementById('p_category').value;
          var sizesStr = document.getElementById('p_sizes').value.trim();
          var sizes = sizesStr ? sizesStr.split(',').map(function(s){ return s.trim(); }) : [];
          var image_url = imageUrlInput.value;

          var res = await fetch('/api/products', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              id: editingId,
              name: name,
              description_kk: desc_kk,
              description_ru: desc_ru,
              price: price,
              category: category,
              image_url: image_url,
              sizes: JSON.stringify(sizes)
            })
          });
          var data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed');

          addStatus.textContent = 'Сақталды!';
          addStatus.style.color = '#2e7d32';
          editingId = null;
          addBtn.textContent = 'Қосу / Добавить';
          clearForm();
          await refreshList();
        } catch(err) {
          addStatus.textContent = 'Қате: ' + (err.message || err);
          addStatus.style.color = '#c62828';
        }
      });

    })();
  </script>
</body>
</html>
