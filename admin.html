<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>Admin — Soul Store</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --accent: #111; --accent-dark: #000; --accent-light: #e8e8e8;
      --text: #111; --text-muted: #666; --bg: #f5f5f5; --card: #fff;
      --border: #ddd; --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 12px; --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding: 20px; }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .back-btn { background: var(--accent); color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: var(--transition); text-decoration: none; display: inline-block; }
    h1 { margin: 0; font-size: 24px; font-weight: 800; }
    #authStatus { padding: 12px 18px; border-radius: var(--radius); background: var(--card); border: 1px solid var(--border); margin-bottom: 20px; font-size: 14px; }
    .admin-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
    .card { background: var(--card); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 13px; color: var(--text-muted); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: var(--transition); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: var(--card); border: 1px solid var(--border); }
    .btn-danger { background: #e53935; color: #fff; }
    
    /* Image Gallery Styles */
    .upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; margin-bottom: 14px; }
    .img-gallery { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; justify-content: center; }
    .img-gallery img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
    .main-preview { width: 100%; max-height: 300px; object-fit: cover; border-radius: var(--radius); display: none; }
    .product-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid var(--border); }
    .product-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
    
    @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back-btn" href="/">&larr; Дүкенге қайту</a>
      <h1>Admin панелі</h1>
    </div>

    <div id="authStatus">Тексеру...</div>

    <div class="admin-grid">
      <div>
        <div class="card" style="margin-bottom:20px">
          <h3 style="margin:0 0 18px;">Өнімді басқару</h3>
          
          <div class="form-group">
            <label>Атауы</label>
            <input id="p_name" placeholder="Өнім атауы" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Баға (₸)</label>
              <input id="p_price" type="number" placeholder="15000" />
            </div>
            <div class="form-group">
              <label>Категория</label>
              <select id="p_category">
                <option value="dresses">Көйлектер</option>
                <option value="hijabs">Орамалдар</option>
                <option value="underwear">Іш киім</option>
                <option value="suits">Костюмдер</option>
                <option value="sweaters">Кофталар</option>
                <option value="pants">Штандар</option>
                <option value="jeans">Джинсылар</option>
                <option value="jackets">Пиджактар</option>
                <option value="sundresses">Сарафандар</option>
                <option value="skirts">Юбкалар</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Өлшемдер (Үтір арқылы: S, M, L)</label>
            <input id="p_sizes" placeholder="S, M, L" />
          </div>

          <div class="form-group">
            <label>Сипаттама (KK)</label>
            <textarea id="p_desc_kk" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label>Суреттер (Multiple)</label>
            <div class="upload-area" id="uploadArea">
              <div id="uploadPlaceholder">Суреттерді таңдау үшін басыңыз</div>
              <div id="galleryPreview" class="img-gallery"></div>
            </div>
          </div>

          <div class="btn-group" style="display:flex; gap:10px;">
            <button id="saveBtn" class="btn btn-primary">Қосу / Добавить</button>
            <button id="clearBtn" class="btn btn-outline">Тазалау</button>
          </div>
          <div id="addStatus" style="margin-top:10px; font-size:14px;"></div>
        </div>

        <div class="card">
          <h3>Бар өнімдер</h3>
          <div id="productsContainer"></div>
        </div>
      </div>

      <aside>
        <div class="card">
          <h4>Предпросмотр</h4>
          <img id="previewImg" class="main-preview" src="" />
          <div id="previewGallery" class="img-gallery"></div>
          <h4 id="previewName" style="margin-top:10px;"></h4>
          <p id="previewPrice" style="color:var(--accent); font-weight:bold;"></p>
        </div>
      </aside>
    </div>
  </div>

  <script>
    UPLOADCARE_PUBLIC_KEY = '3d4dc407820559de1c77';
  </script>
  <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>

  <script>
    (function(){
      let currentImages = [];
      let editingId = null;

      // 1. MULTI-UPLOAD LOGIC
      document.getElementById('uploadArea').onclick = function() {
        uploadcare.openDialog(null, {
          multiple: true,
          imagesOnly: true
        }).done(function(group) {
          group.promise().done(function(groupInfo) {
            const files = groupInfo.files();
            Promise.all(files.map(f => f.promise())).then(fileInfos => {
              currentImages = fileInfos.map(info => info.cdnUrl);
              updateImageUI();
            });
          });
        });
      };

      // 2. UPDATE UI (GALLERY & PREVIEW)
      function updateImageUI() {
        const gallery = document.getElementById('galleryPreview');
        const sidebarMain = document.getElementById('previewImg');
        const sidebarGallery = document.getElementById('previewGallery');
        const placeholder = document.getElementById('uploadPlaceholder');

        gallery.innerHTML = currentImages.map(url => `<img src="${url}">`).join('');
        placeholder.style.display = currentImages.length ? 'none' : 'block';

        if(currentImages.length > 0) {
          sidebarMain.src = currentImages[0];
          sidebarMain.style.display = 'block';
          sidebarGallery.innerHTML = currentImages.map(url => 
            `<img src="${url}" onclick="document.getElementById('previewImg').src='${url}'" style="cursor:pointer">`
          ).join('');
        } else {
          sidebarMain.style.display = 'none';
          sidebarGallery.innerHTML = '';
        }
      }

      // 3. AUTH & LOAD
      auth.onAuthStateChanged(user => {
        if (!user || !(window.ADMIN_EMAILS || []).includes(user.email)) {
          location.href = 'login.html';
          return;
        }
        document.getElementById('authStatus').textContent = 'Сәлем, ' + user.email;
        refreshList();
      });

      async function refreshList() {
        const res = await fetch('/api/products');
        const data = await res.json();
        const container = document.getElementById('productsContainer');
        container.innerHTML = '';

        data.forEach(p => {
          let imgs = [];
          try { imgs = JSON.parse(p.image_url); } catch(e) { imgs = [p.image_url]; }
          
          const div = document.createElement('div');
          div.className = 'product-item';
          div.innerHTML = `
            <img src="${imgs[0] || ''}">
            <div style="flex:1">
              <b>${p.name}</b><br>
              <small>${p.category} | ${imgs.length} сурет</small>
            </div>
            <button class="btn btn-outline" onclick='editProduct(${JSON.stringify(p)})'>Өзгерту</button>
          `;
          container.appendChild(div);
        });
      }

      // 4. SAVE / UPDATE
      document.getElementById('saveBtn').onclick = async function() {
        const status = document.getElementById('addStatus');
        status.textContent = 'Сақталуда...';

        const payload = {
          name: document.getElementById('p_name').value,
          description_kk: document.getElementById('p_desc_kk').value,
          description_ru: '', 
          price: Number(document.getElementById('p_price').value),
          category: document.getElementById('p_category').value,
          image_url: JSON.stringify(currentImages), // Массивті JSON қылып сақтаймыз
          sizes: JSON.stringify(document.getElementById('p_sizes').value.split(',').map(s => s.trim()))
        };

        if(editingId) payload.id = editingId;

        const res = await fetch('/api/products', {
          method: editingId ? 'PUT' : 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });

        if(res.ok) {
          status.textContent = 'Сәтті сақталды!';
          setTimeout(() => location.reload(), 1000);
        } else {
          status.textContent = 'Қате орын алды.';
        }
      };

      // 5. EDIT PRODUCT
      window.editProduct = (p) => {
        editingId = p.id;
        document.getElementById('p_name').value = p.name;
        document.getElementById('p_price').value = p.price;
        document.getElementById('p_category').value = p.category;
        document.getElementById('p_desc_kk').value = p.description_kk || '';
        
        try { 
          currentImages = JSON.parse(p.image_url); 
        } catch(e) { 
          currentImages = p.image_url ? [p.image_url] : []; 
        }

        try {
          const sz = JSON.parse(p.sizes || '[]');
          document.getElementById('p_sizes').value = Array.isArray(sz) ? sz.join(', ') : sz;
        } catch(e) {}

        updateImageUI();
        document.getElementById('saveBtn').textContent = 'Жаңарту';
        window.scrollTo({top: 0, behavior: 'smooth'});
      };

      document.getElementById('clearBtn').onclick = () => location.reload();

    })();
  </script>
</body>
</html>
