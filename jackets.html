<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>Пиджактар — Soul Store</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧥</text></svg>" />
  <style>
    /* Consistently copied standard theme */
    *, *::before, *::after { box-sizing: border-box; }
    :root { --accent: #111; --bg: #f5f5f5; --card: #fff; --border: #ddd; --radius: 12px; }
    body { font-family: system-ui; margin: 0; background: var(--bg); color: var(--accent); }
    .topbar { display: flex; align-items: center; gap: 14px; padding: 14px 24px; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .back-btn { background: var(--accent); color: #fff; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; }
    .page-header { text-align: center; padding: 60px 20px; background: #111; color: white; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; padding: 30px; max-width: 1200px; margin: 0 auto; }
    .product-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; transition: 0.2s; overflow: hidden; }
    .product-card:hover { transform: translateY(-4px); }
    .product-card img { width: 100%; height: 320px; object-fit: cover; }
    .card-body { padding: 16px; }
    .price { font-weight: bold; font-size: 18px; margin-top: 8px; }
    #cart-count { background: red; color: white; font-size: 10px; border-radius: 50%; width: 18px; height: 18px; display: none; align-items: center; justify-content: center; position: absolute; top: -2px; right: -2px; }
    @media (max-width: 700px) { .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; } .product-card img { height: 200px; } }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back-btn" href="index.html">← Артқа</a>
    <div style="flex:1; font-weight:bold">Soul Store</div>
    <div onclick="location.href='cart.html'" style="position:relative; cursor:pointer">🛒 <span id="cart-count">0</span></div>
  </div>
  <header class="page-header"><h1>Пиджактар</h1><p>Jackets</p></header>
  <main><div id="products" class="products-grid"></div></main>
  <script>
    (async function() {
      const res = await fetch('/api/products?category=jackets');
      const data = await res.json();
      const grid = document.getElementById('products');
      data.forEach(p => {
        const img = p.image_url.startsWith('[') ? JSON.parse(p.image_url)[0] : p.image_url;
        grid.innerHTML += `<div class="product-card" onclick="location.href='product.html?id=${p.id}'"><img src="${img}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23eee%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2240%22%3E🧥%3C/text%3E%3C/svg%3E'"><div class="card-body"><h3>${p.name}</h3><div class="price">${p.price.toLocaleString()} ₸</div></div></div>`;
      });
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const count = cart.length;
      if(count > 0) { document.getElementById('cart-count').innerText = count; document.getElementById('cart-count').style.display = 'flex'; }
    })();
  </script>
</body>
</html>
