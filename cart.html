<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>Себет — Soul Store</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --accent: #111; --accent-dark: #000; --accent-light: #e8e8e8;
      --text: #111; --text-muted: #666; --bg: #f5f5f5; --card: #fff;
      --border: #ddd; --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 12px; --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
    .topbar { display: flex; align-items: center; gap: 14px; padding: 14px 24px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .back-btn { background: var(--accent); color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: var(--transition); }
    .back-btn:hover { background: var(--accent-dark); }
    .cart-container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px; padding: 30px; }
    .section-card { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .section-title { font-size: 22px; font-weight: 700; margin: 0 0 20px; }
    .delivery-option { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding: 12px; border: 2px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: var(--transition); }
    .delivery-option:hover { border-color: var(--accent-light); }
    .delivery-option input[type="radio"] { accent-color: var(--accent); width: 18px; height: 18px; }
    .delivery-name { font-weight: 600; font-size: 15px; }
    .delivery-desc { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; transition: var(--transition); }
    .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .place-order { width: 100%; padding: 16px; background: #25D366; color: #fff; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 10px; }
    .place-order:hover { background: #1da851; }
    .place-order:disabled { opacity: 0.5; cursor: not-allowed; }
    .wa-icon { width: 24px; height: 24px; fill: #fff; }
    .order-summary { position: sticky; top: 80px; }
    .cart-item { display: flex; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .item-img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; background: var(--bg); }
    .item-details { flex: 1; }
    .item-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .item-meta { color: var(--text-muted); font-size: 13px; }
    .item-actions { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
    .qty-btn, .remove-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; background: var(--card); transition: var(--transition); }
    .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
    .remove-btn { color: #e53935; border-color: #ffcdd2; }
    .remove-btn:hover { background: #ffebee; }
    .qty-display { font-weight: 700; min-width: 24px; text-align: center; }
    .item-price { font-weight: 700; color: var(--accent); font-size: 15px; white-space: nowrap; }
    .total { font-size: 22px; font-weight: 800; text-align: right; margin-top: 20px; padding-top: 16px; border-top: 2px solid var(--border); }
    .total span:last-child { color: var(--accent); }
    .msg { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 14px; }
    .msg.error { background: #ffebee; color: #c62828; }
    .msg.success { background: #e8f5e9; color: #2e7d32; }
    .whatsapp-note { margin-top: 12px; padding: 14px; background: #e8f5e9; border-radius: var(--radius); font-size: 13px; color: #2e7d32; border: 1px solid #c8e6c9; line-height: 1.5; }
    @media (max-width: 768px) {
      .cart-container { grid-template-columns: 1fr; gap: 20px; padding: 16px; }
      .order-summary { position: static; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">&larr; Артқа</button>
    <div style="font-weight:700;font-size:16px">Себет / Корзина</div>
  </div>

  <div class="cart-container">
    <div class="section-card">
      <h2 class="section-title">Тапсырыс мәліметтері / Данные заказа</h2>

      <div class="form-group">
        <label>Атыңыз / Ваше имя</label>
        <input type="text" id="customerName" placeholder="Айгүл" required />
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <input type="tel" id="phone" placeholder="+7 777 123 45 67" required />
      </div>

      <h3 style="font-size:18px;font-weight:700;margin:24px 0 14px">Жеткізу / Доставка</h3>
      <div class="delivery-option">
        <input type="radio" id="home-delivery" name="delivery" value="home" checked>
        <label for="home-delivery">
          <div class="delivery-name">Үйге жеткізу / Доставка домой</div>
          <div class="delivery-desc">5-7 жұмыс күні / рабочих дней</div>
        </label>
      </div>
      <div class="delivery-option">
        <input type="radio" id="pickup" name="delivery" value="pickup">
        <label for="pickup">
          <div class="delivery-name">Алу нүктесі / Пункт выдачи</div>
          <div class="delivery-desc">2-3 жұмыс күні / рабочих дней</div>
        </label>
      </div>

      <div id="address-form">
        <div class="form-group">
          <label>Қала / Город</label>
          <input type="text" id="city" placeholder="Алматы" />
        </div>
        <div class="form-group">
          <label>Мекенжай / Адрес</label>
          <input type="text" id="address" placeholder="Абай даңғылы 10" />
        </div>
      </div>

      <button id="place-order" class="place-order">
        <svg class="wa-icon" viewBox="0 0 24 24"><path fill="#fff" d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp арқылы тапсырыс беру
      </button>
      <div class="whatsapp-note">
        Тапсырыс мәліметтері WhatsApp-қа жіберіледі. Төлем туралы дүкен менеджері хабарласады.<br>
        Данные заказа будут отправлены в WhatsApp. Менеджер свяжется для оплаты.
      </div>
      <div id="error-message" class="msg error" style="display:none"></div>
    </div>

    <div class="section-card order-summary">
      <h3 class="section-title">Тапсырыс / Заказ</h3>
      <div id="cart-items"></div>
      <div class="total">
        Барлығы / Итого: <span id="total-price">0 &#8376;</span>
      </div>
    </div>
  </div>

  <script>
    (function(){
      // Store WhatsApp number (change this to the store's actual WhatsApp number)
      var STORE_WHATSAPP = '77777777777';

      function escapeHtml(s) {
        if (!s && s !== 0) return '';
        return String(s).replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; });
      }

      var cart = JSON.parse(localStorage.getItem('cart') || '[]');
      var selectedDelivery = 'home';

      function renderCart() {
        var container = document.getElementById('cart-items');
        container.innerHTML = '';
        var total = 0;

        if (cart.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px">Себет бос / Корзина пуста</p>';
          document.getElementById('place-order').disabled = true;
          document.getElementById('total-price').textContent = '0 \u20B8';
          return;
        }

        document.getElementById('place-order').disabled = false;

        cart.forEach(function(item, index) {
          var qty = item.quantity || 1;
          var price = Number(item.price) || 0;

          var div = document.createElement('div');
          div.className = 'cart-item';

          var img = document.createElement('img');
          img.src = item.image || '';
          img.alt = escapeHtml(item.name);
          img.className = 'item-img';
          img.onerror = function(){ this.src = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 70 70%22><rect fill=%22%23f0f0f0%22 width=%2270%22 height=%2270%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23111%22 font-size=%2220%22>\uD83D\uDC57</text></svg>'; };
          div.appendChild(img);

          var details = document.createElement('div');
          details.className = 'item-details';
          details.innerHTML =
            '<div class="item-name">' + escapeHtml(item.name) + '</div>' +
            '<div class="item-meta">Өлшем: ' + escapeHtml(item.size || '-') + '</div>' +
            '<div class="item-actions">' +
              '<button class="qty-btn" data-action="decrease" data-index="' + index + '">&minus;</button>' +
              '<span class="qty-display">' + qty + '</span>' +
              '<button class="qty-btn" data-action="increase" data-index="' + index + '">+</button>' +
              '<button class="remove-btn" data-index="' + index + '">&#10005;</button>' +
            '</div>';
          div.appendChild(details);

          var priceEl = document.createElement('div');
          priceEl.className = 'item-price';
          priceEl.textContent = (price * qty).toLocaleString() + ' \u20B8';
          div.appendChild(priceEl);

          container.appendChild(div);
          total += price * qty;
        });

        document.getElementById('total-price').textContent = total.toLocaleString() + ' \u20B8';

        container.querySelectorAll('.qty-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var idx = Number(this.dataset.index);
            if (this.dataset.action === 'increase') {
              cart[idx].quantity = (cart[idx].quantity || 1) + 1;
            } else if ((cart[idx].quantity || 1) > 1) {
              cart[idx].quantity--;
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
          });
        });
        container.querySelectorAll('.remove-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            cart.splice(Number(this.dataset.index), 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
          });
        });
      }

      // Delivery toggle
      document.querySelectorAll('input[name="delivery"]').forEach(function(radio) {
        radio.addEventListener('change', function() {
          selectedDelivery = this.value;
          document.getElementById('address-form').style.display = selectedDelivery === 'home' ? 'block' : 'none';
        });
      });

      // WhatsApp order
      document.getElementById('place-order').addEventListener('click', function() {
        var errorEl = document.getElementById('error-message');
        errorEl.style.display = 'none';

        var customerName = document.getElementById('customerName').value.trim();
        var phone = document.getElementById('phone').value.trim();
        if (!customerName || !phone) {
          errorEl.textContent = 'Атыңызды және телефонды толтырыңыз / Укажите имя и телефон';
          errorEl.style.display = 'block';
          return;
        }

        var city = document.getElementById('city').value.trim();
        var address = document.getElementById('address').value.trim();
        if (selectedDelivery === 'home' && (!city || !address)) {
          errorEl.textContent = 'Қала мен мекенжайды толтырыңыз / Укажите город и адрес';
          errorEl.style.display = 'block';
          return;
        }

        if (cart.length === 0) {
          errorEl.textContent = 'Себет бос / Корзина пуста';
          errorEl.style.display = 'block';
          return;
        }

        // Build WhatsApp message
        var total = 0;
        var itemLines = [];
        cart.forEach(function(item) {
          var qty = item.quantity || 1;
          var price = Number(item.price) || 0;
          var lineTotal = price * qty;
          total += lineTotal;
          itemLines.push(
            '- ' + item.name +
            ' | Өлшем: ' + (item.size || '-') +
            ' | x' + qty +
            ' | ' + lineTotal.toLocaleString() + ' ₸'
          );
        });

        var deliveryText = selectedDelivery === 'home'
          ? 'Үйге жеткізу / Доставка: ' + city + ', ' + address
          : 'Алу нүктесі / Самовывоз';

        var message = '🛍 *Soul Store — Жаңа тапсырыс*\n\n' +
          '👤 Аты / Имя: ' + customerName + '\n' +
          '📞 Телефон: ' + phone + '\n\n' +
          '📦 *Тауарлар / Товары:*\n' + itemLines.join('\n') + '\n\n' +
          '💰 *Барлығы / Итого: ' + total.toLocaleString() + ' ₸*\n\n' +
          '🚚 ' + deliveryText + '\n\n' +
          'Рахмет! / Спасибо!';

        // Open WhatsApp with the message
        var whatsappUrl = 'https://wa.me/' + STORE_WHATSAPP + '?text=' + encodeURIComponent(message);
        window.open(whatsappUrl, '_blank');

        // Clear cart after sending
        localStorage.removeItem('cart');
        cart = [];
        renderCart();
      });

      renderCart();
    })();
  </script>
</body>
</html>
