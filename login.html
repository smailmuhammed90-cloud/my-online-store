<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <title>Кіру — Soul Store</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👗</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --accent: #111; --accent-dark: #000; --accent-light: #e8e8e8;
      --text: #111; --text-muted: #666; --bg: #f5f5f5; --card: #fff;
      --border: #ddd; --radius: 12px; --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: var(--card); padding: 40px 36px; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); max-width: 420px; width: 100%; border: 1px solid var(--border); }
    .logo { text-align: center; margin-bottom: 8px; font-size: 32px; }
    h1 { margin: 0 0 6px; font-size: 26px; text-align: center; font-weight: 800; }
    .subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin: 0 0 28px; }
    input { width: 100%; padding: 12px 16px; margin-bottom: 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; transition: var(--transition); }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    button { width: 100%; padding: 13px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 15px; margin-bottom: 12px; transition: var(--transition); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-google { background: var(--card); color: var(--text); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { background: var(--bg); border-color: var(--accent); }
    .btn-google svg { width: 20px; height: 20px; }
    .divider { text-align: center; color: var(--text-muted); margin: 18px 0; font-size: 13px; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    p { text-align: center; font-size: 14px; color: var(--text-muted); margin: 16px 0 0; }
    a { color: var(--accent); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .msg { padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }
    .msg.error { background: #ffebee; color: #c62828; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#128087;</div>
    <h1>Кіру</h1>
    <p class="subtitle">Soul Store аккаунтыңызға кіріңіз</p>
    <div id="errorMsg" class="msg"></div>
    <button id="googleLoginBtn" class="btn-google">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google арқылы кіру
    </button>
    <div class="divider">немесе</div>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Құпия сөз / Пароль" />
    <button id="loginBtn" class="btn-primary">Кіру / Войти</button>
    <p>Аккаунтыңыз жоқ па? <a href="signup.html">Тіркелу</a></p>
    <p style="margin-top:8px"><a href="index.html">&larr; Басты бетке</a></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script>
    var errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.className = 'msg error';
    }

    document.getElementById('googleLoginBtn').addEventListener('click', function() {
      var provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).then(function(result) {
        if (result && result.user) {
          window.location.href = 'index.html';
        }
      }).catch(function(err) {
        console.error('Google sign-in error:', err);
        if (err.code === 'auth/popup-closed-by-user') return;
        if (err.code === 'auth/popup-blocked') {
          // Fallback to redirect if popup is blocked
          auth.signInWithRedirect(provider);
        } else {
          showError(err.message || 'Google кіру қатесі');
        }
      });
    });

    document.getElementById('loginBtn').addEventListener('click', async function() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      if (!email || !password) { showError('Email мен құпия сөзді толтырыңыз'); return; }
      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message || 'Кіру қатесі');
      }
    });

    // Allow Enter key
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
